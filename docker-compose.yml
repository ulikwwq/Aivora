services:
  postgres:
    image: postgres:16
    container_name: aivora-db
    environment:
      POSTGRES_DB: aivora
      POSTGRES_USER: aivora_user
      POSTGRES_PASSWORD: password123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
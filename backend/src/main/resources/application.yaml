spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aivora
    username: aivora_user
    password: aivora_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
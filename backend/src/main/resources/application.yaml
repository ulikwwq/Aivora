spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/aivora}
    username: ${SPRING_DATASOURCE_USERNAME:aivora_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:aivora-super-secret-key-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}

groq:
  api-key: ${GROQ_API_KEY:your-key}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}